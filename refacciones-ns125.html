<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refacciones NS125</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
}

header{
    background:#0d1b2f;
    padding:20px;
    text-align:center;
}

h1{
    color:#00AEEF;
    margin:0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#0d1b2f;
    border:1px solid #1c2c44;
    border-radius:10px;
    padding:15px;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.2s;
}

.card img:hover{
    transform:scale(1.03);
}

.codigo{
    color:#00AEEF;
    font-weight:bold;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <h1>REFACCIONES NS125</h1>
</header>

<section class="grid">

    <div class="card">
        <img src="images/ns125/refacciones/filtro-aire.jpg" onclick="openImg(this)">
        <div class="codigo">NS125-001</div>
        <div>Filtro de aire</div>
    </div>

    <div class="card">
        <img src="images/ns125/refacciones/bujia.jpg" onclick="openImg(this)">
        <div class="codigo">DD111018</div>
        <div>Bujía</div>
    </div>

</section>

<!-- Visor -->
<div class="modal" id="modal" onclick="closeImg()">
    <img id="modalImg">
</div>

<script>
function openImg(img){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = img.src;
}

function closeImg(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
