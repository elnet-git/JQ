<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS200 Refacciones</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#07111f;
  color:white;
}

header{
  background:#0d1b2f;
  padding:20px;
  text-align:center;
}

h1{color:#00AEEF;margin:0;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#0d1b2f;
  padding:15px;
  border-radius:10px;
  border:1px solid #1c2c44;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:10px;
}

.codigo{color:#00AEEF;font-weight:bold;}
</style>
</head>

<body>

<header>
  <h1>REFACCIONES NS200</h1>
</header>

<section class="grid">

  <div class="card">
    <img src="../images/ns200/refacciones/filtro-de-aire-fi.jpg" alt="">
    <div class="codigo">DT581062</div>
    <div>filtro de aire FI</div>
  </div>

  <div class="card">
    <img src="../images/ns200/refacciones/bujia.jpg" alt="Bujía">
    <div class="codigo">39130002</div>
    <div>Bujía</div>
  </div>

  <div class="card">
    <img src="../images/ns200/refacciones/clutch.jpg" alt="Clutch">
    <div class="codigo">39130003</div>
    <div>Clutch</div>
  </div>

</section>

</body>
</html>
